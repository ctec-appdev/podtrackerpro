name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test:security

      - run: npm audit --omit=dev
